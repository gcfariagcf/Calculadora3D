<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora 3D — Duo3DLab</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── Theme tokens ── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --primary:      #1a73e8;
      --primary-dk:   #1557b0;
      --primary-lt:   #e8f0fe;
      --text:         #1c1c1e;
      --text-muted:   #6b7280;
      --border:       #d1d5db;
      --error:        #dc2626;
      --error-bg:     #fef2f2;
      --success:      #16a34a;
      --warning:      #d97706;
      --warning-bg:   #fffbeb;
      --shadow:       0 1px 3px rgba(0,0,0,.1), 0 4px 12px rgba(0,0,0,.06);
      --radius:       10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0f1117;
        --surface:      #1c1f26;
        --primary:      #5a9cf8;
        --primary-dk:   #3d7de8;
        --primary-lt:   #1a2540;
        --text:         #e5e7eb;
        --text-muted:   #9ca3af;
        --border:       #2d3140;
        --error:        #f87171;
        --error-bg:     #1f1010;
        --success:      #4ade80;
        --warning:      #fbbf24;
        --warning-bg:   #1f1a0a;
        --shadow:       0 1px 3px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
      }
    }

    /* ── Ad banner ── */
    #ad-top {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 1rem;
      overflow: hidden;
    }
    .ad-top-link { display: inline-flex; }
    .ad-top-img {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: 90px;
      object-fit: contain;
      transition: opacity .2s;
    }
    .ad-top-img:hover { opacity: .85; }

    /* ── Sidebar ads ── */
    .ad-block { margin-bottom: .85rem; }
    .ad-block:last-child { margin-bottom: 0; }
    .ad-block-link {
      display: block;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ad-side-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: opacity .2s, transform .2s;
    }
    .ad-side-img:hover { opacity: .88; transform: scale(1.02); }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .logo-wrap { flex-shrink: 0; }
    .logo-img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      display: block;
    }
    .logo-fallback {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
      color: #fff;
      font-weight: 800;
      font-size: .82rem;
      letter-spacing: -.02em;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-brand h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -.02em;
    }
    .header-brand small {
      display: block;
      font-size: .7rem;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .lang-toggle { display: flex; align-items: center; gap: .35rem; }
    .lang-sep { color: var(--border); }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: .25rem .5rem;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .lang-btn:hover { color: var(--primary); background: var(--primary-lt); }
    .lang-btn.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }

    /* ── Main layout ── */
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      #sidebar { order: 2; }
    }

    /* ── Sidebar ── */
    #sidebar { display: flex; flex-direction: column; gap: 1rem; }
    #ad-sidebar { position: sticky; top: 80px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: .9rem;
      font-weight: 700;
      color: var(--primary);
      border-left: 3px solid var(--primary);
      padding-left: .65rem;
      margin-bottom: 1.2rem;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    /* ── Form fields ── */
    .field { margin-bottom: .9rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: .3rem;
    }
    .field select {
      width: 100%;
      padding: .5rem .75rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .field select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
    }
    .field input[type="number"], .field input[type="url"] {
      width: 100%;
      padding: .5rem .75rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      font-size: .9rem;
      transition: border-color .15s, box-shadow .15s;
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
    }
    .field input.err-input { border-color: var(--error); }
    .field-error {
      display: none;
      color: var(--error);
      font-size: .75rem;
      margin-top: .25rem;
    }
    .field-error.show { display: block; }
    .field-note {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: .3rem;
      line-height: 1.4;
    }
    .field-row   { display: grid; grid-template-columns: 1fr 1fr;     gap: .85rem; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .85rem; }
    @media (max-width: 480px) {
      .field-row, .field-row-3 { grid-template-columns: 1fr; }
    }

    /* ── Box reference table ── */
    details { margin-top: .6rem; }
    details summary {
      cursor: pointer;
      font-size: .75rem;
      color: var(--primary);
      user-select: none;
    }
    .box-ref-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: .5rem;
      font-size: .78rem;
    }
    .box-ref-table th {
      text-align: left;
      padding: .3rem .5rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .box-ref-table td {
      padding: .3rem .5rem;
      border-bottom: 1px solid var(--border);
    }
    .box-ref-table tr:last-child td { border-bottom: none; }

    /* ── Calculate button ── */
    #btn-calculate {
      width: 100%;
      padding: .85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .25rem;
      letter-spacing: .02em;
      transition: background .15s, transform .1s;
    }
    #btn-calculate:hover  { background: var(--primary-dk); }
    #btn-calculate:active { transform: scale(.99); }

    /* ── Alerts ── */
    .alert {
      padding: .65rem .9rem;
      border-radius: 7px;
      font-size: .82rem;
      margin-bottom: .9rem;
      line-height: 1.45;
    }
    .alert-warning { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
    .alert-error   { background: var(--error-bg);   border: 1px solid var(--error);   color: var(--error);   }

    /* ── Box selected badge ── */
    .box-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      border-radius: 20px;
      padding: .2rem .75rem;
      font-size: .78rem;
      font-weight: 600;
      margin-top: .5rem;
    }

    /* ── Result table ── */
    .result-table { width: 100%; border-collapse: collapse; }
    .result-table td {
      padding: .5rem .6rem;
      font-size: .87rem;
      border-bottom: 1px solid var(--border);
    }
    .result-table td:last-child { text-align: right; font-weight: 600; }
    .result-table tr:nth-child(even) td { background: color-mix(in srgb, var(--primary) 4%, transparent); }
    .result-table tr.total-row td {
      font-weight: 700;
      font-size: .95rem;
      color: var(--primary);
      border-top: 2px solid var(--border);
      border-bottom: none;
      padding-top: .7rem;
    }
    .packing-sub { font-size: .72rem; color: var(--text-muted); margin-left: .3rem; }

    /* ── Suggested price ── */
    .suggested-big {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: .35rem;
    }
    .suggested-label { font-size: .78rem; color: var(--text-muted); margin-bottom: 1rem; }
    .search-label-text { font-size: .8rem; color: var(--text-muted); margin-bottom: .6rem; }

    /* ── Search buttons ── */
    .search-buttons { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .9rem; }
    .search-btn {
      display: inline-block;
      padding: .38rem .9rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      border: none;
      transition: opacity .15s;
    }
    .search-btn:hover { opacity: .85; }
    .search-btn.google      { background: #4285f4; }
    .search-btn.etsy        { background: #f56400; }
    .search-btn.makerworld  { background: #00bcd4; }

    /* ── Reference URL ── */
    .ref-url-wrap { display: flex; flex-direction: column; gap: .4rem; }
    .ref-url-input {
      width: 100%;
      padding: .45rem .75rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      font-size: .82rem;
    }
    .ref-url-input:focus { outline: none; border-color: var(--primary); }
    .ref-url-link {
      font-size: .78rem;
      color: var(--primary);
      word-break: break-all;
      text-decoration: underline;
    }

    /* ── Capacity grid ── */
    .capacity-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      text-align: center;
    }
    .capacity-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem .75rem;
    }
    .capacity-label { font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
    .big-number { font-size: 2.2rem; font-weight: 800; color: var(--primary); line-height: 1; }

    /* ── Result rows ── */
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .87rem;
      gap: 1rem;
    }
    .result-row:last-child { border-bottom: none; }
    .result-value { font-weight: 700; white-space: nowrap; }
    .positive { color: var(--success); }
    .negative { color: var(--error); }

    /* ── Export button ── */
    #btn-export {
      display: block;
      margin: .5rem 0 0 auto;
      padding: .55rem 1.4rem;
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: var(--radius);
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #btn-export:hover { background: var(--primary); color: #fff; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.75rem 1rem;
      color: var(--text-muted);
      font-size: .8rem;
      border-top: 1px solid var(--border);
      margin-top: .5rem;
    }

    /* ── Print/PDF ── */
    @media print {
      #ad-top, #ad-sidebar, header, footer, #calc-form,
      .pdf-hide, #btn-export { display: none !important; }
      main { display: block; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
    }
  </style>
</head>
<body>

  <!-- ═══ TOP AD BANNER ═══ -->
  <div id="ad-top">
    <a class="ad-top-link" href="https://www.instagram.com/duo3dlab/" target="_blank" rel="noopener" aria-label="Duo3DLab on Instagram">
      <img class="ad-top-img" src="ad-duo3dlab.jpg" alt="Duo3DLab">
    </a>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-brand">
      <!-- Logo links to the Duo3DLab Instagram page. Image source: https://www.instagram.com/duo3dlab/
           Place logo.png in the same folder as this file. The gradient circle is the fallback. -->
      <a class="logo-wrap" href="https://instagram.com/duo3dlab/" target="_blank" rel="noopener" aria-label="Duo3DLab on Instagram">
        <img id="logo-img" class="logo-img" src="logo.png" alt="Duo3DLab"
             onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';">
        <div id="logo-fallback" class="logo-fallback">D3</div>
      </a>
      <div>
        <h1>Calculadora 3D</h1>
        <small data-i18n="powered_by"></small>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-en" aria-label="English">EN</button>
      <span class="lang-sep">|</span>
      <button class="lang-btn" id="btn-pt" aria-label="Português">PT</button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div id="content">

      <!-- ── FORM ── -->
      <form id="calc-form" novalidate>

        <!-- Section 1: Print Parameters -->
        <section class="card" id="s-print">
          <h2 data-i18n="section_print"></h2>
          <div class="field-row">
            <div class="field">
              <label for="weight" data-i18n="lbl_weight"></label>
              <input type="number" id="weight" min="0.1" step="0.1" placeholder="e.g. 45">
              <span class="field-error" id="err-weight" data-i18n="err_positive"></span>
            </div>
            <div class="field">
              <label for="pieces-per-cycle" data-i18n="lbl_pieces_per_cycle"></label>
              <input type="number" id="pieces-per-cycle" min="1" step="1" value="1" placeholder="1">
              <span class="field-error" id="err-pieces-per-cycle" data-i18n="err_min_one"></span>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="print-h" data-i18n="lbl_print_h"></label>
              <input type="number" id="print-h" min="0" step="1" value="0" placeholder="0">
              <span class="field-error" id="err-print-time" data-i18n="err_print_time"></span>
            </div>
            <div class="field">
              <label for="print-min" data-i18n="lbl_print_min"></label>
              <input type="number" id="print-min" min="0" max="59" step="1" value="0" placeholder="0">
              <span class="field-error" id="err-print-min" data-i18n="err_minutes"></span>
            </div>
          </div>
          <div class="field">
            <label for="filament-price" data-i18n="lbl_filament"></label>
            <input type="number" id="filament-price" min="0.01" step="0.01" placeholder="e.g. 25.00">
            <span class="field-error" id="err-filament" data-i18n="err_positive"></span>
          </div>
        </section>

        <!-- Section 2: Machine & Operations -->
        <section class="card" id="s-machine">
          <h2 data-i18n="section_machine"></h2>
          <div class="field-row">
            <div class="field">
              <label for="working-h" data-i18n="lbl_working_h"></label>
              <input type="number" id="working-h" min="0.5" max="24" step="0.5" placeholder="e.g. 8">
              <span class="field-error" id="err-working-h" data-i18n="err_positive"></span>
            </div>
            <div class="field">
              <label for="working-days" data-i18n="lbl_working_days"></label>
              <input type="number" id="working-days" min="1" max="31" step="1" placeholder="e.g. 22">
              <span class="field-error" id="err-working-days" data-i18n="err_positive"></span>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="labor-rate" data-i18n="lbl_labor"></label>
              <input type="number" id="labor-rate" min="0" step="0.01" value="0" placeholder="0.00">
            </div>
            <div class="field">
              <label for="electricity-rate" data-i18n="lbl_electricity"></label>
              <input type="number" id="electricity-rate" min="0" step="0.01" value="0" placeholder="0.00">
            </div>
          </div>
          <div class="field">
            <label for="printer-price" data-i18n="lbl_printer_price"></label>
            <input type="number" id="printer-price" min="0" step="1" value="0" placeholder="0">
            <div class="field-note" id="depreciation-note" style="display:none;"></div>
          </div>
          <div class="field">
            <label for="failure-rate" data-i18n="lbl_failure"></label>
            <input type="number" id="failure-rate" min="0" max="99" step="1" value="10">
            <span class="field-error" id="err-failure" data-i18n="err_failure_range"></span>
          </div>
        </section>

        <!-- Section 3: Post-Processing -->
        <section class="card" id="s-postproc">
          <h2 data-i18n="section_postproc"></h2>
          <div class="field">
            <label for="postproc-minutes" data-i18n="lbl_postproc"></label>
            <input type="number" id="postproc-minutes" min="0" step="1" value="0" placeholder="0">
          </div>
        </section>

        <!-- Section 4: Accessories & Packing -->
        <section class="card" id="s-packing">
          <h2 data-i18n="section_packing"></h2>
          <div class="field-row">
            <div class="field">
              <label for="accessories-cost" data-i18n="lbl_accessories"></label>
              <input type="number" id="accessories-cost" min="0" step="0.01" value="0" placeholder="0.00">
            </div>
            <div class="field">
              <label for="box-size" data-i18n="lbl_box_size"></label>
              <select id="box-size">
                <option value="XS">XS — 10×10×10 cm — $1</option>
                <option value="S" selected>S — 20×15×10 cm — $2</option>
                <option value="M">M — 30×20×15 cm — $3</option>
                <option value="L">L — 40×30×20 cm — $4</option>
                <option value="XL">XL — 50×40×30 cm — $5</option>
              </select>
            </div>
          </div>
        </section>

        <!-- Section 5: Pricing -->
        <section class="card" id="s-pricing">
          <h2 data-i18n="section_pricing"></h2>
          <div class="field-row">
            <div class="field">
              <label for="margin" data-i18n="lbl_margin"></label>
              <input type="number" id="margin" min="0" max="99" step="1" value="0" placeholder="e.g. 30">
              <span class="field-error" id="err-margin" data-i18n="err_margin_100"></span>
            </div>
            <div class="field">
              <label for="selling-price" data-i18n="lbl_selling"></label>
              <input type="number" id="selling-price" min="0.01" step="0.01" placeholder="e.g. 15.00">
              <span class="field-error" id="err-selling" data-i18n="err_positive"></span>
            </div>
          </div>
        </section>

        <button type="button" id="btn-calculate" data-i18n="btn_calculate"></button>
      </form>

      <!-- ── RESULTS ── -->
      <div id="results" style="display:none; margin-top:1.5rem;">

        <!-- PDF-only header (hidden on screen) -->
        <div id="pdf-header" style="display:none; padding:0 0 1rem 0; border-bottom:2px solid #1a73e8; margin-bottom:1rem;">
          <div style="font-size:1.3rem; font-weight:800; color:#1a73e8;">Calculadora 3D</div>
          <div style="font-size:.8rem; color:#757575;" id="pdf-brand">Duo3DLab</div>
          <div style="font-size:.78rem; color:#9ca3af; margin-top:.2rem;" id="pdf-date"></div>
        </div>

        <!-- Cost Breakdown -->
        <section class="card" id="res-breakdown">

  // ─── State ──────────────────────────────────────────────────────────────────
  let lang        = 'en';
  let lastResult  = null;
  let lastInputs  = null;

  // ─── Session persistence — Machine & Operations ──────────────────────────────
  const MACHINE_KEY    = 'calc3d_machine';
  const MACHINE_FIELDS = ['working-h','working-days','labor-rate','electricity-rate','printer-price','failure-rate'];

  function saveMachine() {
    try {
      const data = {};
      MACHINE_FIELDS.forEach(id => { data[id] = document.getElementById(id).value; });
      localStorage.setItem(MACHINE_KEY, JSON.stringify(data));
    } catch (_) {}
  }

  function loadMachine() {
    try {
      const raw = localStorage.getItem(MACHINE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      MACHINE_FIELDS.forEach(id => {
        if (data[id] !== undefined && data[id] !== '') {
          document.getElementById(id).value = data[id];
        }
      });
    } catch (_) {}
  }

  // ─── i18n helpers ───────────────────────────────────────────────────────────
  function t(key) {
    return STRINGS[lang][key] !== undefined ? STRINGS[lang][key] : key;
  }

  function detectLang() {
    const nav = (navigator.language || '').toLowerCase();
    return nav.startsWith('pt') ? 'pt' : 'en';
  }

  function applyLang(l) {
    lang = l;
    document.documentElement.lang = l === 'pt' ? 'pt-BR' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const val = STRINGS[l][el.dataset.i18n];
      if (val === undefined) return;
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = val;
      } else {
        el.textContent = val;
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const val = STRINGS[l][el.dataset.i18nPlaceholder];
      if (val !== undefined) el.placeholder = val;
    });
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    document.getElementById('btn-pt').classList.toggle('active', l === 'pt');
    if (lastResult && lastInputs) renderResults(lastResult, lastInputs, false);
  }

  // ─── Box data ───────────────────────────────────────────────────────────────
  const BOXES = [
    { name: 'XS', cost: 1 },
    { name: 'S',  cost: 2 },
    { name: 'M',  cost: 3 },
    { name: 'L',  cost: 4 },
    { name: 'XL', cost: 5 },
  ];

  // ─── Read inputs ────────────────────────────────────────────────────────────
  function readInputs() {
    const n  = id => parseFloat(document.getElementById(id).value) || 0;
    const i  = id => parseInt(document.getElementById(id).value)   || 0;
    const boxName = document.getElementById('box-size').value || 'S';
    const box = BOXES.find(b => b.name === boxName) || BOXES[1];
    return {
      weight:            n('weight'),
      pieces_per_cycle:  Math.max(1, i('pieces-per-cycle') || 1),
      print_h:           i('print-h'),
      print_min:         i('print-min'),
      filament_price:    n('filament-price'),
      working_h:         n('working-h'),
      working_days:      n('working-days'),
      labor_rate:        n('labor-rate'),
      electricity_rate:  n('electricity-rate'),
      printer_price:     n('printer-price'),
      failure_rate:      n('failure-rate'),
      postproc_minutes:  n('postproc-minutes'),
      accessories_cost:  n('accessories-cost'),
      box,
      margin:            n('margin'),
      selling_price:     n('selling-price'),
    };
  }

  // ─── Validation ─────────────────────────────────────────────────────────────
  function clearErrors() {
    document.querySelectorAll('.field-error.show').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('input.err-input').forEach(e => e.classList.remove('err-input'));
  }

  function flagError(inputId, errorId) {
    const inp = document.getElementById(inputId);
    const err = document.getElementById(errorId);
    if (inp) inp.classList.add('err-input');
    if (err) err.classList.add('show');
  }

  function validateInputs(inp) {
    let ok = true;
    const fail = (inpId, errId) => { flagError(inpId, errId); ok = false; };

    if (inp.weight              <= 0)                     fail('weight',          'err-weight');
    if (inp.pieces_per_cycle    <  1)                     fail('pieces-per-cycle','err-pieces-per-cycle');
    if (inp.print_h === 0 && inp.print_min === 0)         fail('print-h',         'err-print-time');
    if (inp.print_min < 0 || inp.print_min > 59)          fail('print-min',       'err-print-min');
    if (inp.filament_price      <= 0)                     fail('filament-price',  'err-filament');
    if (inp.working_h           <= 0)                     fail('working-h',       'err-working-h');
    if (inp.working_days        <= 0)                     fail('working-days',    'err-working-days');
    if (inp.failure_rate < 0 || inp.failure_rate > 99)    fail('failure-rate',    'err-failure');
    if (inp.margin >= 100)                                fail('margin',          'err-margin');
    if (inp.selling_price       <= 0)                     fail('selling-price',   'err-selling');

    if (!ok) {
      const first = document.querySelector('input.err-input');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return ok;
  }

  // ─── Core calculation ───────────────────────────────────────────────────────
  function calculate(inp) {
    const print_time     = inp.print_h + inp.print_min / 60;
    const ppc            = Math.max(1, inp.pieces_per_cycle);
    const failure_factor = inp.failure_rate < 100 ? 1 / (1 - inp.failure_rate / 100) : 1;

    // Per-piece costs: electricity/depreciation/labor are cycle costs split across pieces
    const filament_cost  = (inp.weight / 1000) * inp.filament_price;
    const elec_cost      = print_time > 0 ? (print_time * inp.electricity_rate) / ppc : 0;
    const depr_per_hour  = (inp.printer_price > 0 && inp.working_h > 0 && inp.working_days > 0)
      ? inp.printer_price / (3 * 12 * inp.working_days * inp.working_h) : 0;
    const depr_piece     = print_time > 0 ? (depr_per_hour * print_time) / ppc : 0;
    const print_labor    = print_time > 0 ? (print_time * inp.labor_rate) / ppc : 0;

    const filament_adj   = filament_cost * failure_factor;
    const elec_adj       = elec_cost     * failure_factor;
    const depr_adj       = depr_piece    * failure_factor;
    const labor_adj      = print_labor   * failure_factor;

    const post_proc_cost = (inp.postproc_minutes / 60) * inp.labor_rate;
    const packing_cost   = inp.box ? inp.box.cost : 0;

    const total_cost = filament_adj + elec_adj + depr_adj + labor_adj
      + post_proc_cost + inp.accessories_cost + packing_cost;

    const suggested_price = inp.margin < 100 && inp.margin >= 0
      ? total_cost / (1 - inp.margin / 100)
      : total_cost;

    // Capacity: full cycles per day × pieces per cycle
    const cycles_per_day   = print_time > 0 ? Math.floor(inp.working_h / print_time) : 0;
    const pieces_per_day   = cycles_per_day * ppc;
    const pieces_per_month = pieces_per_day * inp.working_days;
    const no_capacity      = pieces_per_day === 0;

    // Revenue
    const daily_revenue   = pieces_per_day   * inp.selling_price;
    const monthly_revenue = pieces_per_month * inp.selling_price;
    const monthly_profit  = monthly_revenue  - pieces_per_month * total_cost;
    const actual_margin   = monthly_revenue  > 0 ? (monthly_profit / monthly_revenue) * 100 : 0;

    // Break-even (fixed: wages + machine depreciation; variable: material/energy/accessories/packing/postproc)
    const fixed_monthly      = (inp.working_h * inp.working_days * inp.labor_rate)
      + (inp.printer_price > 0 ? inp.printer_price / 36 : 0);
    const variable_per_piece = filament_adj + elec_adj + inp.accessories_cost
      + packing_cost + post_proc_cost;
    const contribution       = inp.selling_price - variable_per_piece;
    const no_breakeven       = contribution <= 0;
    const breakeven_units    = !no_breakeven ? Math.ceil(fixed_monthly / contribution) : null;
    const breakeven_days     = (!no_breakeven && pieces_per_day > 0)
      ? Math.ceil(breakeven_units / pieces_per_day) : null;

    return {
      filament_adj, elec_adj, depr_adj, labor_adj,
      post_proc_cost, accessories_cost: inp.accessories_cost,
      packing_cost, box: inp.box,
      total_cost, suggested_price,
      cycles_per_day, pieces_per_day, pieces_per_month, no_capacity,
      daily_revenue, monthly_revenue, monthly_profit, actual_margin,
      fixed_monthly, variable_per_piece, contribution,
      breakeven_units, breakeven_days, no_breakeven,
      depr_per_hour,
      weight: inp.weight,
      selling_price: inp.selling_price,
    };
  }

  // ─── Formatting ─────────────────────────────────────────────────────────────
  function fmt(val, dec = 2) {
    const locale = lang === 'pt' ? 'pt-BR' : 'en-US';
    return '$' + val.toLocaleString(locale, {
      minimumFractionDigits:  dec,
      maximumFractionDigits:  dec,
    });
  }

  function fmtNum(val) {
    return val.toLocaleString(lang === 'pt' ? 'pt-BR' : 'en-US');
  }

  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  // ─── Render results ─────────────────────────────────────────────────────────
  function renderResults(res, inp, scroll = true) {

    // Cost breakdown
    setText('r-filament',        fmt(res.filament_adj));
    setText('r-electricity',     fmt(res.elec_adj));
    setText('r-depreciation',    fmt(res.depr_adj));
    setText('r-printing-labor',  fmt(res.labor_adj));
    setText('r-postproc',        fmt(res.post_proc_cost));
    setText('r-accessories',     fmt(res.accessories_cost));

    const packingLabel = document.getElementById('r-packing-label');
    packingLabel.textContent = res.box ? `(${res.box.name})` : '';
    setText('r-packing', fmt(res.packing_cost));
    setText('r-total',   fmt(res.total_cost));

    // Suggested price
    setText('r-suggested-price', fmt(res.suggested_price));

    // Search buttons
    const w = encodeURIComponent(inp.weight + 'g');
    document.getElementById('search-google').href =
      `https://www.google.com/search?q=3d+print+cost+${w}`;
    document.getElementById('search-etsy').href =
      `https://www.etsy.com/search?q=3d+printed+${w}`;
    document.getElementById('search-makerworld').href =
      `https://makerworld.com/en/search/models?keyword=3d+print`;

    // Depreciation note in form
    const deprNote = document.getElementById('depreciation-note');
    if (res.depr_per_hour > 0) {
      deprNote.textContent = `${t('depr_note')} ${fmt(res.depr_per_hour)}/h`;
      deprNote.style.display = 'block';
    } else {
      deprNote.style.display = 'none';
    }

    // Capacity
    const capWarn = document.getElementById('capacity-warning');
    const capGrid = document.getElementById('capacity-grid');
    if (res.no_capacity) {
      capWarn.textContent   = t('warn_no_capacity');
      capWarn.style.display = 'block';
      capGrid.style.display = 'none';
    } else {
      capWarn.style.display = 'none';
      capGrid.style.display = 'grid';
      setText('r-pieces-day',   fmtNum(res.pieces_per_day));
      setText('r-pieces-month', fmtNum(res.pieces_per_month));
    }

    // Revenue
    const revWarn    = document.getElementById('revenue-warning');
    const revContent = document.getElementById('revenue-content');
    if (res.no_capacity) {
      revWarn.textContent    = t('warn_no_revenue');
      revWarn.style.display  = 'block';
      revContent.style.display = 'none';
    } else {
      revWarn.style.display    = 'none';
      revContent.style.display = 'block';
      setText('r-selling',         fmt(res.selling_price));
      setText('r-daily-revenue',   fmt(res.daily_revenue));
      setText('r-monthly-revenue', fmt(res.monthly_revenue));

      const profitEl = document.getElementById('r-monthly-profit');
      profitEl.textContent = fmt(res.monthly_profit);
      profitEl.className   = 'result-value ' + (res.monthly_profit >= 0 ? 'positive' : 'negative');

      const marginEl = document.getElementById('r-actual-margin');
      marginEl.textContent = res.actual_margin.toFixed(1) + '%';
      marginEl.className   = 'result-value ' + (res.actual_margin >= 0 ? 'positive' : 'negative');
    }

    // Break-even
    const beErr     = document.getElementById('breakeven-error');
    const beContent = document.getElementById('breakeven-content');
    if (res.no_breakeven) {
      beErr.textContent    = t('warn_no_breakeven');
      beErr.style.display  = 'block';
      beContent.style.display = 'none';
    } else {
      beErr.style.display     = 'none';
      beContent.style.display = 'block';
      setText('r-fixed-costs',    fmt(res.fixed_monthly));
      setText('r-variable-cost',  fmt(res.variable_per_piece));
      setText('r-contribution',   fmt(res.contribution));
      setText('r-breakeven-units',
        res.breakeven_units !== null ? fmtNum(res.breakeven_units) : t('na'));
      setText('r-breakeven-days',
        res.breakeven_days  !== null ? fmtNum(res.breakeven_days)  : t('na'));
    }

    // Show results section and export button
    const resultsEl = document.getElementById('results');
    resultsEl.style.display = 'block';
    document.getElementById('btn-export').style.display = 'block';

    if (scroll) resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ─── PDF export ─────────────────────────────────────────────────────────────
  function exportPDF() {
    const pdfHeader = document.getElementById('pdf-header');
    const pdfDate   = document.getElementById('pdf-date');
    pdfDate.textContent = new Date().toLocaleDateString(
      lang === 'pt' ? 'pt-BR' : 'en-US',
      { year: 'numeric', month: 'long', day: 'numeric' }
    );
    pdfHeader.style.display = 'block';

    const hideEls = document.querySelectorAll('.pdf-hide');
    const saved   = [];
    hideEls.forEach(el => { saved.push(el.style.display); el.style.display = 'none'; });

    const date = new Date().toISOString().slice(0, 10);
    html2pdf().set({
      margin:      12,
      filename:    `calculadora3d-${date}.pdf`,
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(document.getElementById('results')).save().then(() => {
      pdfHeader.style.display = 'none';
      hideEls.forEach((el, idx) => { el.style.display = saved[idx]; });
    });
  }

  // ─── Reference URL handler ───────────────────────────────────────────────────
  function onRefUrl(e) {
    const link = document.getElementById('ref-url-link');
    const val  = e.target.value.trim();
    if (val) {
      link.href        = val;
      link.textContent = val;
      link.style.display = 'block';
    } else {
      link.style.display = 'none';
    }
  }

  // ─── Live update ─────────────────────────────────────────────────────────────
  function liveUpdate() {
    const inp = readInputs();
    const ready = inp.weight > 0
      && (inp.print_h > 0 || inp.print_min > 0)
      && inp.filament_price > 0
      && inp.working_h > 0
      && inp.working_days > 0
      && inp.selling_price > 0
      && inp.failure_rate < 100;
    if (!ready) return;
    lastInputs = inp;
    lastResult = calculate(inp);
    renderResults(lastResult, lastInputs, false);
  }

  // ─── Dynamic margin ↔ price sync ─────────────────────────────────────────────
  let syncing = false;

  function syncPriceFromMargin() {
    if (syncing) return;
    const marginVal = parseFloat(document.getElementById('margin').value);
    if (isNaN(marginVal) || marginVal >= 100 || marginVal < 0) return;
    const inp = readInputs();
    if (inp.weight <= 0 || inp.filament_price <= 0 || inp.working_h <= 0 || inp.working_days <= 0) return;
    const res = calculate(inp);
    if (res.total_cost <= 0) return;
    syncing = true;
    document.getElementById('selling-price').value = (res.total_cost / (1 - marginVal / 100)).toFixed(2);
    syncing = false;
  }

  function syncMarginFromPrice() {
    if (syncing) return;
    const priceVal = parseFloat(document.getElementById('selling-price').value);
    if (isNaN(priceVal) || priceVal <= 0) return;
    const inp = readInputs();
    if (inp.weight <= 0 || inp.filament_price <= 0 || inp.working_h <= 0 || inp.working_days <= 0) return;
    const res = calculate(inp);
    if (res.total_cost <= 0 || res.total_cost >= priceVal) {
      document.getElementById('margin').value = '0';
      return;
    }
    syncing = true;
    document.getElementById('margin').value = ((1 - res.total_cost / priceVal) * 100).toFixed(1);
    syncing = false;
  }

  // ─── Calculate handler ───────────────────────────────────────────────────────
  function onCalculate() {
    clearErrors();
    const inputs = readInputs();
    if (!validateInputs(inputs)) return;
    lastInputs = inputs;
    lastResult = calculate(inputs);
    renderResults(lastResult, lastInputs);
  }

  // ─── Init ────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadMachine();           // restore saved machine values before anything else
    lang = detectLang();
    applyLang(lang);

    document.getElementById('btn-en').addEventListener('click', () => applyLang('en'));
    document.getElementById('btn-pt').addEventListener('click', () => applyLang('pt'));
    document.getElementById('btn-calculate').addEventListener('click', onCalculate);
    document.getElementById('btn-export').addEventListener('click', exportPDF);
    document.getElementById('ref-url-input').addEventListener('input', onRefUrl);

    // Margin ↔ price dynamic sync
    document.getElementById('margin').addEventListener('input', () => {
      syncPriceFromMargin();
      liveUpdate();
    });
    document.getElementById('selling-price').addEventListener('input', () => {
      syncMarginFromPrice();
      liveUpdate();
    });

    // Live update on all inputs; also persist Machine & Operations fields
    const liveIds = [
      'weight','pieces-per-cycle','print-h','print-min','filament-price',
      'working-h','working-days','labor-rate','electricity-rate',
      'printer-price','failure-rate','postproc-minutes','accessories-cost',
    ];
    liveIds.forEach(id => {
      document.getElementById(id).addEventListener('input', liveUpdate);
    });
    document.getElementById('box-size').addEventListener('change', liveUpdate);

    // Persist Machine & Operations on every change
    MACHINE_FIELDS.forEach(id => {
      document.getElementById(id).addEventListener('input', saveMachine);
    });
  });
  </script>
</body>
</html>
